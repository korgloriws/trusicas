services:
  trusicas:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: trusicas
    restart: unless-stopped
    ports:
      # 5090 no host — não conflita com finmas (8080), gerador (5080) nem cvps (9876)
      - "5090:5050"
    env_file:
      - .env
    environment:
      - FLASK_HOST=0.0.0.0
      - PORT=5050
    volumes:
      - ./data:/app/data
      - ./output:/app/output
    networks:
      - trusicas-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5050/api/auth/me"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

networks:
  trusicas-net:
    name: trusicas-net
    driver: bridge
